services:
  web-app-1:
    build:
      context: .
      dockerfile: apps/web/web-app-1/Dockerfile.dev
    ports:
      - "3001:5173"
    volumes:
      - ./apps/web/web-app-1/src:/app/apps/web/web-app-1/src
      - ./apps/web/web-app-1/index.html:/app/apps/web/web-app-1/index.html
    environment:
      - NODE_ENV=development

  web-app-2:
