# Production compose — builds optimized nginx images from each app's Dockerfile.
# Each app is isolated: separate build context, separate image, separate container.
#
# Build all:   docker compose -f docker-compose.prod.yml build
# Run all:     docker compose -f docker-compose.prod.yml up -d
# Single app:  docker compose -f docker-compose.prod.yml up web-app-1

services:
  web-app-1:
    build:
      context: .
      dockerfile: apps/web/web-app-1/Dockerfile
    ports:
      - "3001:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

