<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nidhi Chhimwal — Senior UI/UX Designer & Illustrator. 5+ years crafting enterprise and consumer digital experiences at Samsung Electronics." />
    <meta property="og:title" content="Nidhi Chhimwal — Senior UI/UX Designer" />
    <meta property="og:description" content="5+ years bridging research, strategy, and visual craft. Currently at Samsung Electronics, Gurugram." />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,900;1,400;1,700;1,900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>Nidhi Chhimwal — Senior UI/UX Designer</title>

    <!-- Theme init: runs before paint to prevent flash -->
    <script>
      (function () {
        var stored = localStorage.getItem('nidhi-theme');
        var theme = stored ?? 'light';
        document.documentElement.setAttribute('data-theme', theme);
        // Prevent transition flash on first load
        document.documentElement.classList.add('no-transition');
        window.addEventListener('load', function () {
          requestAnimationFrame(function () {
            document.documentElement.classList.remove('no-transition');
          });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
