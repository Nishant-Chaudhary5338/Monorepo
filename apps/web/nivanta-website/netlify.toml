[build]
  base = "/"
  command = "pnpm --filter nivanta-website build"
  publish = "apps/web/nivanta-website/dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/web/nivanta-website/ packages/"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "8.15.6"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options        = "nosniff"
    X-Frame-Options               = "SAMEORIGIN"
    Referrer-Policy               = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy    = "same-origin-allow-popups"
    Permissions-Policy            = "camera=(), microphone=(), geolocation=(self)"

# ── Long-cache for versioned static assets ────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Moderate cache for images and videos ─────────────────
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
