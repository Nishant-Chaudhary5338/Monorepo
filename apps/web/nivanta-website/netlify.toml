[build]
  base = "/"
  command = "pnpm --filter nivanta-website build"
  publish = "apps/web/nivanta-website/dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/web/nivanta-website/ packages/"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "8.15.6"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
